services:
  mirofish:
    image: docker.epilb.com/public/mirofish-en:3
    # Mirror for faster pulling if needed
    # image: docker.epilb.com/public/mirofish-en:3
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
